<!DOCTYPE html>
<html>
<head>
    <title>Invoice Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
<!DOCTYPE html>
<html>
<head>
    <title>Receipt</title>
</head>
<body>

<h2>VOICE BANKING RECEIPT</h2>

<p><b>User:</b> {{ user }}</p>
<p><b>Current Balance:</b> ₹ {{ balance }}</p>
<p><b>Status:</b> Success</p>

<br>
<button onclick="window.print()">Print Receipt</button>

</body>
</html>

</body>
</html>
