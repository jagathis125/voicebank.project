<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
<style>
   body {
    background: linear-gradient(to right, #1e3c72, #2a5298);
    font-family: Arial;
    color: white;
    text-align: center;
}
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #1e3c72, #2a5298);
}

/* Center Full Page */
.main-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card Style */
.form-card {
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
    text-align: center;
    width: 350px;
    color: white;
}

h2 {
    margin-bottom: 20px;
}

input {
    padding: 12px 45px 12px 15px;
    margin: 12px 0;
    border-radius: 25px;
    border: none;
    width: 100%;
    font-size: 16px;
    box-sizing: border-box;

}

.password-wrapper {
    position: relative;
}

.eye-icon {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 20px;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border-radius: 25px;
    border: none;
    background: #00e5ff;
    font-size: 16px;
    cursor: pointer;
     max-width: 50%;
}

.container {
    margin-top: 80px;
}

form {
    display: inline-block;
}

input {
    padding: 12px 45px 12px 15px;
    margin: 12px 0;
    border-radius: 25px;
    border: none;
    width: 300px;          /* Same width for all */
    font-size: 16px;       /* Bigger text */
    box-sizing: border-box;
}

.password-wrapper {
    position: relative;
    width: 300px;          /* Same as input */
    margin: 12px auto;
}

.password-wrapper input {
    width: 100%;
}

.eye-icon {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 20px;       /* Bigger eye */
}

button {
    padding: 12px 30px;
    border-radius: 25px;
    border: none;
    background: #00e5ff;
    font-size: 16px;
    cursor: pointer;
}
</style>
  <script>
function togglePassword() {
    let input = document.getElementById("password");
    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}

</script>

</head>

<body>

<div class="main-container">

    <div class="form-card">
        <h2>Edit User Details</h2>

        <form method="POST">

            <input type="text" name="username"
                   value="{{ user.username }}" required>

            <input type="text" name="mobile"
                   value="{{ user.mobile }}" required>

            <div class="password-wrapper">
                <input type="password" id="password" name="password"
                       value="{{ user.password }}" required>
                <span class="eye-icon" onclick="togglePassword()">👁</span>
            </div>

            <input type="number" name="balance"
                   value="{{ user.account_balance }}" required>
            <br>
            <button type="submit">UPDATE USER</button>

        </form>
    </div>

</div>

</body>


</body>
</html>
