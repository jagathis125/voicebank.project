<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Bank</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        min-height: 100vh;
        font-family: 'Segoe UI', sans-serif;
    }

    .navbar {
        background: linear-gradient(to right, #000428, #004e92) !important;
        padding: 15px 30px;
    }

    .navbar-brand {
        font-weight: bold;
        font-size: 24px;
        color: #ffffff !important;
    }

    .nav-link {
        color: #ffffff !important;
        margin-left: 15px;
        transition: 0.3s;
        font-size: x-large;
    }

    .nav-link:hover {
        color: #00ffcc !important;
        transform: scale(1.05);
    }

    .main-container {
        background: rgba(255, 255, 255, 0.1);
        font-size: x-large;
        text-align: center;
        backdrop-filter: blur(12px);
        margin: 20px auto;
        padding: 40px;
        border-radius: 65px;
        width: 85%;
        color: white;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    footer {
        text-align: center;
        padding: 15px;
        color: white;
        margin-top: 30px;
    }
</style>
</head>

<body>

<header>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('index') }}" id="brandText">🏦 ABC Bank</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('index') }}" id="homeText">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('login') }}" id="loginText">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('logout') }}" id="logoutText">Logout</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('adminlogin') }}" id="adminText">Admin</a>
          </li>
          <li class="nav-item">
            <button class="btn btn-sm btn-light ms-3" onclick="setLanguage('en')">English</button>
            <button class="btn btn-sm btn-warning ms-2" onclick="setLanguage('ta')">தமிழ்</button>
          </li>
        </ul>
      </div>
    </div>
</nav>
</header>

<div class="main-container">
    {% block content %}
    <span id="welcomeText">Welcome To ABC Bank</span>
    {% endblock %}
</div>

<footer>
    <span id="footerText">© 2026 ABC Bank | Voice Banking System</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function applyLanguage(lang) {
    // Navbar Text
    document.getElementById("homeText").innerText = (lang==="ta")?"முகப்பு":"Home";
    document.getElementById("loginText").innerText = (lang==="ta")?"உள்நுழை":"Login";
    document.getElementById("logoutText").innerText = (lang==="ta")?"வெளியேறு":"Logout";
    document.getElementById("adminText").innerText = (lang==="ta")?"அட்மின்":"Admin";

    // Content Text
    if(document.getElementById("welcomeText")){
        document.getElementById("welcomeText").innerText = (lang==="ta")?"ஏபிசி வங்கிக்கு வரவேற்கிறோம்":"Welcome To ABC Bank";
    }
    if(document.getElementById("footerText")){
        document.getElementById("footerText").innerText = (lang==="ta")?"© 2026 ஏபிசி வங்கி | குரல் வங்கி அமைப்பு":"© 2026 ABC Bank | Voice Banking System";
    }

    // Login Page Labels
    if(document.getElementById("loginTitle")){
        document.getElementById("loginTitle").innerText = (lang==="ta")?"🔐 ஏபிசி வங்கி உள்நுழைவு":"🔐 ABC Bank Login";
        if(document.getElementById("mobileLabel")) document.getElementById("mobileLabel").innerText = (lang==="ta")?"தொலைபேசி எண்":"Phone Number";
        if(document.getElementById("passLabel")) document.getElementById("passLabel").innerText = (lang==="ta")?"கடவுச்சொல்":"Password";
        if(document.getElementById("loginBtn")) document.getElementById("loginBtn").innerText = (lang==="ta")?"உள்நுழை":"Login";
    }
}

function setLanguage(lang){
    localStorage.setItem("lang", lang);
    applyLanguage(lang);
}

window.onload = function(){
    const savedLang = localStorage.getItem("lang") || "en";
    applyLanguage(savedLang);
};
</script>

</body>
</html>
