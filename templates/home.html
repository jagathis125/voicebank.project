<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voice Banking</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
}

.main-container {
    width: 950px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    color: white;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.left-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.lang-btn {
    padding: 6px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #00c6ff;
    font-weight: bold;
}

.back-btn {
    padding: 6px 15px;
    background-color: #ff4b5c;
    color: white;
    font-weight: bold;
    border-radius: 20px;
    text-decoration: none;
}

.container-wrapper {
    display: flex;
    justify-content: space-between;
    gap: 30px;
    margin-top: 25px;
}

.card {
    flex: 1;
    background: rgba(0,0,0,0.3);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    border-radius: 20px;
    border: none;
    margin-bottom: 15px;
    text-align: center;
    font-size: 16px;
}

.voice-btn {
    width: 95px;
    height: 95px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    font-size: 14px;
    cursor: pointer;
    font-weight: bold;
}

#responseBox {
    margin-top: 25px;
    padding: 15px;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
    text-align: center;
}

.download-btn {
    margin-top: 20px;
    padding: 8px 20px;
    background-color: #28a745;
    color: white;
    border-radius: 20px;
    text-decoration: none;
    font-weight: bold;
    display: inline-block;
}
</style>
</head>

<body>

<div class="main-container">

    <div class="header">
        <div class="left-header">
            <a href="/login" class="back-btn" id="backBtn"></a>
        </div>

        <div>
            <button class="lang-btn" onclick="setLanguage('ta')">தமிழ்</button>
            <button class="lang-btn" onclick="setLanguage('en')">English</button>
        </div>
    </div>

    <div style="text-align:center; font-size:20px;">
        <h2 id="title"></h2>
    </div>

    <div class="container-wrapper">

        <!-- MONEY TRANSFER -->
        <div class="card">
            <h3 id="transferTitle"></h3>
            <input type="text" id="mobileInput">
            <button class="voice-btn" onclick="startTransfer()">
                <span id="transferSpeakText"></span>
            </button>
        </div>

        <!-- BALANCE CHECK (NOT REMOVED ✅) -->
        <div class="card">
            <h3 id="balanceTitle"></h3>
            <button class="voice-btn" onclick="startBalance()">
                <span id="balanceSpeakText"></span>
            </button>
        </div>

    </div>

    <div id="responseBox">
        <strong id="responseLabel"></strong>
        <span id="responseText"></span>
    </div>

    <div style="text-align:center;">
        <a href="/acknow" class="download-btn" id="downloadBtn"></a>
    </div>

</div>

<!-- SAFE JSON HOLDER -->
<script id="success-json" type="application/json">
{{ success_data | tojson if success_data else 'null' }}
</script>

<script>

let currentLang = localStorage.getItem("lang") || "ta";

// ---------- SAFE JSON READ ----------
let successData = null;
try {
    const rawData = document.getElementById("success-json").textContent.trim();
    if (rawData && rawData !== "null") {
        successData = JSON.parse(rawData);
    }
} catch (e) {
    successData = null;
}

// ---------- LANGUAGE ----------
function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem("lang", lang);
    applyLanguage();
}

function applyLanguage() {

    const title = document.getElementById("title");
    const transferTitle = document.getElementById("transferTitle");
    const balanceTitle = document.getElementById("balanceTitle");
    const transferSpeakText = document.getElementById("transferSpeakText");
    const balanceSpeakText = document.getElementById("balanceSpeakText");
    const responseLabel = document.getElementById("responseLabel");
    const mobileInput = document.getElementById("mobileInput");
    const backBtn = document.getElementById("backBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    if (currentLang === "ta") {

        title.innerText = "🎤 குரல் வங்கி";
        transferTitle.innerText = "💰 பணம் அனுப்பு";
        balanceTitle.innerText = "📊 இருப்பு பார்க்க";
        transferSpeakText.innerText = "பணம் பேசவும்";
        balanceSpeakText.innerText = "பேசவும்";
        responseLabel.innerText = "பதில்: ";
        mobileInput.placeholder = "பெறுநர் மொபைல் எண்";
        backBtn.innerText = "⬅ திரும்ப";
        downloadBtn.innerText = "⬇ ரசீது பதிவிறக்கம்";

    } else {

        title.innerText = "🎤 Voice Banking";
        transferTitle.innerText = "💰 Money Transfer";
        balanceTitle.innerText = "📊 Balance Check";
        transferSpeakText.innerText = "Speak Amount";
        balanceSpeakText.innerText = "Speak";
        responseLabel.innerText = "Response: ";
        mobileInput.placeholder = "Enter Receiver Mobile";
        backBtn.innerText = "⬅ Back";
        downloadBtn.innerText = "⬇ Download Receipt";
    }
}

// ---------- SPEECH FUNCTION ----------
function speakText(text, lang) {

    if (!('speechSynthesis' in window)) {
        console.log("Speech not supported");
        return;
    }

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = (lang === "ta") ? "ta-IN" : "en-US";

    window.speechSynthesis.cancel();

    // wait for voices to load (important fix)
    const voices = window.speechSynthesis.getVoices();
    if (voices.length === 0) {
        window.speechSynthesis.onvoiceschanged = function () {
            window.speechSynthesis.speak(speech);
        };
    } else {
        window.speechSynthesis.speak(speech);
    }
}

// ---------- ON LOAD ----------
document.addEventListener("click", function enableSpeech() {
    window.speechSynthesis.resume();
    document.removeEventListener("click", enableSpeech);
});
window.addEventListener("load", function () {

    applyLanguage();

    if (successData && successData.amount) {

        let message = "";

        if (successData.lang === "ta") {
            message =
                successData.receiver_name + " அவர்களுக்கு " +
                successData.amount + " ரூபாய் வெற்றிகரமாக அனுப்பப்பட்டது. " +
                "மீதமுள்ள இருப்பு " +
                successData.balance + " ரூபாய்.";
        } else {
            message =
                successData.amount + " rupees transferred successfully to " +
                successData.receiver_name + ". " +
                "Your remaining balance is " +
                successData.balance + " rupees.";
        }

        document.getElementById("responseText").innerText = message;

        document.body.addEventListener("click", function playOnce() {
            speakText(message, successData.lang);
            document.body.removeEventListener("click", playOnce);
        });
        
        // 🔥 IMPORTANT FIX: slight delay + resume
        setTimeout(() => {
            window.speechSynthesis.resume();
            speakText(message, successData.lang);
        }, 1000);
    }
});

// ---------- TRANSFER ----------
function startTransfer() {

    const mobile = document.getElementById("mobileInput").value.trim();

    if (!mobile) {
        document.getElementById("responseText").innerText =
            currentLang === "ta" ? "மொபைல் எண் தேவை" : "Mobile number required";
        return;
    }

    document.getElementById("responseText").innerText =
        currentLang === "ta" ? "கேட்கிறது..." : "Listening...";

    fetch('/voice_command', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            language: currentLang,
            typed_mobile: mobile
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.redirect) {
            window.location.href = data.redirect;
            return;
        }
        document.getElementById("responseText").innerText =
            data.response_text || data.error || "Unexpected response";
    })
    .catch(() => {
        document.getElementById("responseText").innerText = "Server error";
    });
}

// ---------- BALANCE ----------
function startBalance() {

    document.getElementById("responseText").innerText =
        currentLang === "ta" ? "கேட்கிறது..." : "Listening...";

    fetch('/voice_command', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            language: currentLang,
            typed_mobile: ""
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.redirect) {
            window.location.href = data.redirect;
            return;
        }
        document.getElementById("responseText").innerText =
            data.response_text || data.error || "Unexpected response";
    })
    .catch(() => {
        document.getElementById("responseText").innerText = "Server error";
    });
}

</script>

</body>
</html>
